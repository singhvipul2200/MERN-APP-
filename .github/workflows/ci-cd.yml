# ============================================================
# Name of this workflow
# ============================================================
name: Namaste MERN CI/CD Pipeline

# ============================================================
# Manual Trigger
# ============================================================
on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this pipeline manually?"
        required: false
        default: "Manual Trigger"

jobs:

# ============================================================
# JOB 1 - UNIT TESTS
# ============================================================
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # Backend
      - name: Install Backend Dependencies
        working-directory: backend
        run: npm install

      - name: Run Backend Tests
        working-directory: backend
        run: npm test -- --ci

      # Frontend
      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm install

      - name: Lint Frontend
        working-directory: frontend
        run: npm run lint

# ============================================================
# JOB 2 - SONARCLOUD ANALYSIS
# ============================================================
  sonarcloud:
    name: SonarCloud Code Analysis
    needs: unit-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

# ============================================================
# JOB 3 - BUILD & PUSH DOCKER IMAGES
# ============================================================
  build-and-push:
    name: Build and Push Docker Images
    needs: sonarcloud
    runs-on: ubuntu-latest

    steps:
      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login DockerHub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Backend Image
      - name: Build & Push Backend Image
        id: backend_build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: vipulsingh2200/nam-back:latest

      # Frontend Image
      - name: Build & Push Frontend Image
        id: frontend_build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: vipulsingh2200/nam-front:latest

      # Success Message
      - name: Build Successful
        if: success()
        run: |
          echo "✅ Backend Image Pushed Successfully"
          echo "Backend Digest: ${{ steps.backend_build.outputs.digest }}"
          echo "✅ Frontend Image Pushed Successfully"
          echo "Frontend Digest: ${{ steps.frontend_build.outputs.digest }}"
          echo "🎉 CI/CD Pipeline Completed Successfully."

      # Failure Message
      - name: Build Failed
        if: failure()
        run: |
          echo "❌ Docker Build or Push Failed."
          echo "Check the logs above for more information."
